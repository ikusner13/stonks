{# One ticker/position input row. `r` is {symbol, value, price} or absent for a blank row. #}
<div class="flex items-center gap-2">
  <input name="symbol" value="{{ r.symbol if r else '' }}" placeholder="Ticker"
    class="w-32 rounded-xl border border-[var(--line)] bg-transparent px-3 py-2 text-sm uppercase" />
  <input name="value" value="{{ r.value if r and r.value is not none else '' }}"
    placeholder="$ position (optional)" inputmode="decimal"
    class="w-44 rounded-xl border border-[var(--line)] bg-transparent px-3 py-2 text-sm" />
  <input type="hidden" name="price" value="{{ r.price if r and r.price is not none else '' }}" />
  <button type="button" onclick="this.closest('div').remove()"
    class="rounded-full border border-[var(--line)] px-3 py-1 text-xs">Remove</button>
</div>
