<div id="targets-panel">
  <form hx-post="/portfolio/targets"
        hx-target="#targets-panel"
        hx-swap="outerHTML"
        class="space-y-3">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-[var(--line)] text-xs text-[var(--sea-ink-soft)]">
            <th class="pb-2 text-left font-medium">Symbol</th>
            <th class="pb-2 text-right font-medium">Target %</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[var(--line)]">
          {% for row in rows %}
          <tr>
            <td class="py-2 pr-4">
              <input name="symbol[]" value="{{ row.symbol }}" placeholder="AAPL"
                class="w-28 rounded-xl border border-[var(--line)] bg-transparent px-3 py-2 text-sm uppercase" />
            </td>
            <td class="py-2 text-right">
              <input name="weight_pct[]" type="number" min="0" max="100" step="0.01"
                value="{% if row.weight_pct is not none %}{{ '%.2f' | format(row.weight_pct) }}{% endif %}"
                placeholder="0.00"
                class="w-28 rounded-xl border border-[var(--line)] bg-transparent px-3 py-2 text-right text-sm tabular-nums" />
            </td>
          </tr>
          {% endfor %}
          <tr>
            <td class="py-2 pr-4">
              <input name="symbol[]" placeholder="Ticker"
                class="w-28 rounded-xl border border-[var(--line)] bg-transparent px-3 py-2 text-sm uppercase" />
            </td>
            <td class="py-2 text-right">
              <input name="weight_pct[]" type="number" min="0" max="100" step="0.01"
                placeholder="0.00"
                class="w-28 rounded-xl border border-[var(--line)] bg-transparent px-3 py-2 text-right text-sm tabular-nums" />
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="flex flex-wrap items-center justify-between gap-3">
      <p class="text-xs text-[var(--sea-ink-soft)]">
        Implicit cash target: <span class="font-semibold">{{ implicit_cash_weight | pct }}</span>
      </p>
      <button type="submit"
        class="rounded-full border border-[var(--line)] bg-[var(--chip-bg)] px-4 py-2 text-sm font-semibold">
        Save Targets
      </button>
    </div>
  </form>
</div>
