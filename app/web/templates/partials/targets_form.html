<div id="targets-panel">
  <form hx-post="/portfolio/targets"
        hx-target="#targets-panel"
        hx-swap="outerHTML"
        class="flow">
    <div class="table-shell table-compact">
      <table class="table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th class="num">Target %</th>
          </tr>
        </thead>
        <tbody>
          {% for row in rows %}
          <tr>
            <td>
              <input name="symbol[]" value="{{ row.symbol }}" placeholder="AAPL"
                class="input input-sm" />
            </td>
            <td class="num">
              <input name="weight_pct[]" type="number" min="0" max="100" step="0.01"
                value="{% if row.weight_pct is not none %}{{ '%.2f' | format(row.weight_pct) }}{% endif %}"
                placeholder="0.00"
                class="input input-xs num" />
            </td>
          </tr>
          {% endfor %}
          <tr>
            <td>
              <input name="symbol[]" placeholder="Ticker"
                class="input input-sm" />
            </td>
            <td class="num">
              <input name="weight_pct[]" type="number" min="0" max="100" step="0.01"
                placeholder="0.00"
                class="input input-xs num" />
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="cluster">
      <p class="footnote">
        Implicit cash target: <strong>{{ implicit_cash_weight | pct }}</strong>
      </p>
      <button type="submit" class="btn btn-primary">
        Save Targets
      </button>
    </div>
  </form>
</div>
