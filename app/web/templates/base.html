<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Stock Research{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="page-wrap">
        <a href="/" class="brand">Stock Research</a>
        <div class="nav-links">
          <a href="/" class="nav-link {% if active == 'discover' %}is-active{% endif %}">Discover</a>
          <a href="/watchlist" class="nav-link {% if active == 'watchlist' %}is-active{% endif %}">Watchlist</a>
          <a href="/portfolio" class="nav-link {% if active == 'portfolio' %}is-active{% endif %}">Portfolio</a>
        </div>
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
      Research context only — not investment advice.
    </footer>
  </body>
</html>
